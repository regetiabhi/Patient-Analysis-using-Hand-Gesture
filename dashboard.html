{% extends "layout.html" %}
{% block content %}
<div class="row g-4 animate__animated animate__fadeIn">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-5 p-4 feature-card">
            <h2 class="fw-bold mb-4">Performance Evaluation</h2>
            <div class="row text-center mb-4">
                <div class="col-4">
                    <h1 class="text-primary fw-bold">100%</h1>
                    <p class="text-muted small">Accuracy</p>
                </div>
                <div class="col-4 border-start">
                    <h1 class="text-success fw-bold">0.99</h1>
                    <p class="text-muted small">F1-Score</p>
                </div>
                <div class="col-4 border-start">
                    <h1 class="text-info fw-bold">42ms</h1>
                    <p class="text-muted small">Latency</p>
                </div>
            </div>
            <img src="https://images.pexels.com/photos/669615/pexels-photo-669615.jpeg?auto=compress&cs=tinysrgb&w=800" 
                 class="img-fluid rounded-4 shadow-sm" style="height: 250px; object-fit: cover;" alt="Analytics">
        </div>
    </div>

    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-5 p-4 bg-dark text-white h-100">
            <h4 class="mb-3"><i class="fa-brands fa-discord me-2 text-primary"></i>Notification Sync</h4>
            <p class="small opacity-75">Discord Webhook is active. Emergency signals will trigger immediate caregiver alerts.</p>
            <div class="mt-auto">
                <span class="badge bg-success px-3 py-2 rounded-pill"><i class="fa-solid fa-circle-check me-1"></i> Webhook Online</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
